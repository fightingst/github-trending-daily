<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Trending · 2026.03.18</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            /* Minimalist 配色 - 来自 ui-ux-pro-max-plus */
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #0f172a;
            --accent-light: #1e293b;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --success: #10b981;
            --warning: #f59e0b;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        /* Header - 极简风格 */
        header {
            padding: 80px 0 60px;
            border-bottom: 1px solid var(--border);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 24px;
        }
        
        .header-left h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        
        .header-left .date {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 400;
        }
        
        .stats {
            display: flex;
            gap: 48px;
        }
        
        .stat {
            text-align: right;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        
        .stat-label {
            font-size: 0.8125rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 2px;
        }
        
        /* Filter */
        .filter-section {
            padding: 32px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .filter-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-primary);
        }
        
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        
        /* Projects */
        .projects-section {
            padding: 48px 0;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .project-card {
            background: var(--bg-primary);
            padding: 32px;
            transition: background-color 0.15s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .project-card:hover {
            background: var(--bg-secondary);
        }
        
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .project-info {
            flex: 1;
            min-width: 0;
        }
        
        .project-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .project-author {
            font-size: 0.8125rem;
            color: var(--text-muted);
        }
        
        .rank {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            font-family: 'SF Mono', 'Monaco', monospace;
        }
        
        .project-desc {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
            min-height: 45px;
        }
        
        .project-meta {
            display: flex;
            gap: 20px;
            font-size: 0.8125rem;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
        }
        
        .meta-item svg {
            width: 14px;
            height: 14px;
        }
        
        .stars {
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .language-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        /* Footer */
        footer {
            padding: 48px 0;
            border-top: 1px solid var(--border);
            text-align: center;
        }
        
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .footer-text {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        .footer-links {
            display: flex;
            gap: 24px;
        }
        
        .footer-links a {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.15s ease;
        }
        
        .footer-links a:hover {
            color: var(--text-primary);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            header {
                padding: 48px 0 40px;
            }
            
            .header-content {
                flex-direction: column;
                gap: 32px;
            }
            
            .stats {
                width: 100%;
                justify-content: flex-start;
                gap: 32px;
            }
            
            .stat {
                text-align: left;
            }
            
            .header-left h1 {
                font-size: 2rem;
            }
            
            .projects-grid {
                grid-template-columns: 1fr;
                border-radius: 8px;
            }
            
            .project-card {
                padding: 24px;
            }
            
            .footer-content {
                flex-direction: column;
                text-align: center;
            }
        }
        
        /* 动画 */
        .fade-in {
            animation: fadeIn 0.3s ease forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="header-left">
                    <h1>GitHub Trending</h1>
                    <div class="date">Wednesday, March 18, 2026</div>
                </div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value">15</div>
                        <div class="stat-label">Repositories</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">8</div>
                        <div class="stat-label">Languages</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">35K+</div>
                        <div class="stat-label">Stars</div>
                    </div>
                </div>
            </div>
        </header>
        
        <section class="filter-section">
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterByLanguage('all')">All</button>
                <button class="filter-btn" onclick="filterByLanguage('TypeScript')">TypeScript</button>
                <button class="filter-btn" onclick="filterByLanguage('Python')">Python</button>
                <button class="filter-btn" onclick="filterByLanguage('JavaScript')">JavaScript</button>
                <button class="filter-btn" onclick="filterByLanguage('Rust')">Rust</button>
                <button class="filter-btn" onclick="filterByLanguage('Shell')">Shell</button>
            </div>
        </section>
        
        <section class="projects-section">
            <div class="projects-grid" id="projects-grid"></div>
        </section>
        
        <footer>
            <div class="footer-content">
                <div class="footer-text">
                    Generated by 太子 · Data from GitHub API
                </div>
                <div class="footer-links">
                    <a href="https://github.com/trending" target="_blank">GitHub Trending</a>
                    <a href="https://github.com/fightingst/github-trending-daily" target="_blank">Source</a>
                </div>
            </div>
        </footer>
    </div>
    
    <script>
        const projects = [
            {"rank":"01","name":"NemoClaw","author":"NVIDIA","desc":"NVIDIA plugin for secure installation of OpenClaw","stars":"4.3K","language":"TypeScript","url":"https://github.com/NVIDIA/NemoClaw"},
            {"rank":"02","name":"AutoResearchClaw","author":"aiming-lab","desc":"Fully autonomous research from idea to paper","stars":"4.2K","language":"Python","url":"https://github.com/aiming-lab/AutoResearchClaw"},
            {"rank":"03","name":"Crucix","author":"calesthio","desc":"Personal intelligence agent watching multiple data sources","stars":"3.1K","language":"JavaScript","url":"https://github.com/calesthio/Crucix"},
            {"rank":"04","name":"Recordly","author":"webadderall","desc":"Open-source Screen Studio alternative with auto-zoom","stars":"2.4K","language":"TypeScript","url":"https://github.com/webadderall/Recordly"},
            {"rank":"05","name":"chrome-cdp-skill","author":"pasky","desc":"Give AI agent access to your live Chrome session","stars":"2.1K","language":"JavaScript","url":"https://github.com/pasky/chrome-cdp-skill"},
            {"rank":"06","name":"inkos","author":"Narcooo","desc":"Autonomous novel writing CLI agent","stars":"1.5K","language":"TypeScript","url":"https://github.com/Narcooo/inkos"},
            {"rank":"07","name":"Attention-Residuals","author":"MoonshotAI","desc":"Moonshot AI research release","stars":"1.4K","language":"Unknown","url":"https://github.com/MoonshotAI/Attention-Residuals"},
            {"rank":"08","name":"opencli","author":"jackwener","desc":"Make any website your CLI with AI-native runtime","stars":"1.4K","language":"TypeScript","url":"https://github.com/jackwener/opencli"},
            {"rank":"09","name":"tavily-key-generator","author":"skernelx","desc":"Tavily and Firecrawl signup automation toolkit","stars":"1.3K","language":"Python","url":"https://github.com/skernelx/tavily-key-generator"},
            {"rank":"10","name":"autoresearch","author":"uditgoenka","desc":"Claude Autoresearch Skill for goal-directed iteration","stars":"1.2K","language":"Shell","url":"https://github.com/uditgoenka/autoresearch"},
            {"rank":"11","name":"OpenSquirrel","author":"Infatoshi","desc":"Claude Code control plane built with Rust/GPUI","stars":"1.0K","language":"Rust","url":"https://github.com/Infatoshi/OpenSquirrel"},
            {"rank":"12","name":"Understand-Anything","author":"Lum1104","desc":"Turn any codebase into an interactive knowledge graph","stars":"722","language":"TypeScript","url":"https://github.com/Lum1104/Understand-Anything"},
            {"rank":"13","name":"jobs","author":"karpathy","desc":"Visual explorer for Bureau of Labor Statistics data","stars":"713","language":"HTML","url":"https://github.com/karpathy/jobs"},
            {"rank":"14","name":"pi-generative-ui","author":"Michaelliv","desc":"Claude.ai generative UI reverse-engineered for pi","stars":"707","language":"TypeScript","url":"https://github.com/Michaelliv/pi-generative-ui"},
            {"rank":"15","name":"OpenGenerativeUI","author":"CopilotKit","desc":"Open-source generative UI framework","stars":"627","language":"TypeScript","url":"https://github.com/CopilotKit/OpenGenerativeUI"}
        ];
        
        const languageColors = {
            'TypeScript': '#3178c6',
            'Python': '#3572A5',
            'JavaScript': '#f1e05a',
            'Rust': '#dea584',
            'Shell': '#89e051',
            'HTML': '#e34c26',
            'Unknown': '#94a3b8'
        };
        
        function renderProjects(filteredProjects) {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';
            
            filteredProjects.forEach((project, index) => {
                const card = document.createElement('a');
                card.href = project.url;
                card.target = '_blank';
                card.className = 'project-card fade-in';
                card.style.animationDelay = (index * 0.03) + 's';
                
                card.innerHTML = `
                    <div class="project-header">
                        <div class="project-info">
                            <div class="project-name">${project.name}</div>
                            <div class="project-author">${project.author}</div>
                        </div>
                        <div class="rank">${project.rank}</div>
                    </div>
                    <div class="project-desc">${project.desc}</div>
                    <div class="project-meta">
                        <div class="meta-item stars">
                            <svg viewBox="0 0 16 16" fill="currentColor">
                                <path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/>
                            </svg>
                            ${project.stars}
                        </div>
                        <div class="meta-item">
                            <span class="language-dot" style="background-color: ${languageColors[project.language]}"></span>
                            ${project.language}
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        function filterByLanguage(language) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            if (language === 'all') {
                renderProjects(projects);
            } else {
                renderProjects(projects.filter(p => p.language === language));
            }
        }
        
        renderProjects(projects);
    </script>
</body>
</html>
