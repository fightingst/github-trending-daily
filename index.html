<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Trending 日报 - 2026年03月18日</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            /* Deep Ocean 配色方案 - 来自 ui-ux-pro-max-plus */
            --bg-primary: #0c4a6e;
            --bg-surface: #075985;
            --bg-card: #0f172a;
            --color-primary: #38bdf8;
            --color-secondary: #7dd3fc;
            --color-accent: #f472b6;
            --color-text: #f0f9ff;
            --color-text-muted: #7dd3fc;
            --color-border: #1e40af;
            --color-success: #22c55e;
            --color-warning: #fbbf24;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0f172a 100%);
            min-height: 100vh;
            color: var(--color-text);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
        }
        
        /* Header - 现代企业风格 */
        header {
            text-align: center;
            padding: 48px 24px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.1) 0%, rgba(125, 211, 252, 0.05) 100%);
            border-radius: 16px;
            margin-bottom: 32px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            backdrop-filter: blur(10px);
        }
        
        header h1 {
            font-size: 2.75rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .date {
            font-size: 1.125rem;
            color: var(--color-text-muted);
            margin-bottom: 16px;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-top: 24px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary);
        }
        
        .stat-label {
            font-size: 0.875rem;
            color: var(--color-text-muted);
            margin-top: 4px;
        }
        
        /* Filter Bar */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            padding: 0 16px;
        }
        
        .filter-btn {
            padding: 10px 20px;
            border: 1px solid var(--color-border);
            border-radius: 24px;
            background: transparent;
            color: var(--color-text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .filter-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-text);
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-accent) 100%);
            border-color: transparent;
            color: white;
        }
        
        /* Projects Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }
        
        /* Project Card - 玻璃拟态风格 */
        .project-card {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(56, 189, 248, 0.1);
            transition: all 0.3s ease;
            position: relative;
            backdrop-filter: blur(8px);
        }
        
        .project-card:hover {
            transform: translateY(-4px);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
            border-radius: 12px 12px 0 0;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .project-card:hover::before {
            opacity: 1;
        }
        
        .rank {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--color-text-muted);
            border: 1px solid var(--color-border);
        }
        
        .rank.top3 {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #1e293b;
            border: none;
        }
        
        .project-header {
            margin-bottom: 12px;
            padding-right: 44px;
        }
        
        .project-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-text);
            text-decoration: none;
            display: block;
            margin-bottom: 4px;
            word-break: break-all;
            transition: color 0.2s;
        }
        
        .project-name:hover {
            color: var(--color-primary);
        }
        
        .project-author {
            font-size: 0.8125rem;
            color: var(--color-text-muted);
        }
        
        .project-desc {
            font-size: 0.875rem;
            color: rgba(240, 249, 255, 0.7);
            line-height: 1.5;
            margin-bottom: 16px;
            min-height: 52px;
        }
        
        .project-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8125rem;
        }
        
        .stars {
            color: #fbbf24;
            font-weight: 600;
        }
        
        .stars svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
        
        .language {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--color-text-muted);
        }
        
        .language-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 48px 24px;
            margin-top: 48px;
            color: var(--color-text-muted);
            font-size: 0.875rem;
            border-top: 1px solid rgba(56, 189, 248, 0.1);
        }
        
        footer a {
            color: var(--color-primary);
            text-decoration: none;
            transition: color 0.2s;
        }
        
        footer a:hover {
            color: var(--color-accent);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }
            
            .projects-grid {
                grid-template-columns: 1fr;
            }
            
            .stats {
                gap: 24px;
            }
            
            .stat-value {
                font-size: 1.5rem;
            }
            
            .filter-bar {
                gap: 6px;
            }
            
            .filter-btn {
                padding: 8px 16px;
                font-size: 0.8125rem;
            }
        }
        
        /* 深色模式优化 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #09090b;
                --bg-surface: #0f172a;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 GitHub Trending</h1>
            <div class="date">2026年03月18日 · 每日精选</div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value">15</div>
                    <div class="stat-label">热门项目</div>
                </div>
                <div class="stat">
                    <div class="stat-value">8</div>
                    <div class="stat-label">编程语言</div>
                </div>
                <div class="stat">
                    <div class="stat-value">35K+</div>
                    <div class="stat-label">总星标</div>
                </div>
            </div>
        </header>
        
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterByLanguage('all')">全部</button>
            <button class="filter-btn" onclick="filterByLanguage('TypeScript')">TypeScript</button>
            <button class="filter-btn" onclick="filterByLanguage('Python')">Python</button>
            <button class="filter-btn" onclick="filterByLanguage('JavaScript')">JavaScript</button>
            <button class="filter-btn" onclick="filterByLanguage('Rust')">Rust</button>
            <button class="filter-btn" onclick="filterByLanguage('Shell')">Shell</button>
        </div>
        
        <div class="projects-grid" id="projects-grid"></div>
        
        <footer>
            <p>🤖 由太子自动生成 | 数据来源: GitHub API</p>
            <p style="margin-top: 8px;">
                <a href="https://github.com/trending" target="_blank">查看 GitHub Trending</a> · 
                <a href="https://github.com/fightingst/github-trending-daily" target="_blank">查看源码</a>
            </p>
        </footer>
    </div>
    
    <script>
        const projects = [
            {"rank":1,"name":"NVIDIA/NemoClaw","full_name":"NemoClaw","author":"NVIDIA","desc":"NVIDIA 官方插件，用于安全安装 OpenClaw","stars":4308,"language":"TypeScript","url":"https://github.com/NVIDIA/NemoClaw"},
            {"rank":2,"name":"aiming-lab/AutoResearchClaw","full_name":"AutoResearchClaw","author":"aiming-lab","desc":"全自主、自进化的研究系统——从想法到论文","stars":4210,"language":"Python","url":"https://github.com/aiming-lab/AutoResearchClaw"},
            {"rank":3,"name":"calesthio/Crucix","full_name":"Crucix","author":"calesthio","desc":"个人智能代理，从多个数据源监控世界","stars":3089,"language":"JavaScript","url":"https://github.com/calesthio/Crucix"},
            {"rank":4,"name":"webadderall/Recordly","full_name":"Recordly","author":"webadderall","desc":"免费开源的 Screen Studio 替代品","stars":2351,"language":"TypeScript","url":"https://github.com/webadderall/Recordly"},
            {"rank":5,"name":"pasky/chrome-cdp-skill","full_name":"chrome-cdp-skill","author":"pasky","desc":"让 AI 代理访问你的 Chrome 浏览器会话","stars":2063,"language":"JavaScript","url":"https://github.com/pasky/chrome-cdp-skill"},
            {"rank":6,"name":"Narcooo/inkos","full_name":"inkos","author":"Narcooo","desc":"自主小说写作 CLI 代理","stars":1451,"language":"TypeScript","url":"https://github.com/Narcooo/inkos"},
            {"rank":7,"name":"MoonshotAI/Attention-Residuals","full_name":"Attention-Residuals","author":"MoonshotAI","desc":"Moonshot AI 出品","stars":1405,"language":"Unknown","url":"https://github.com/MoonshotAI/Attention-Residuals"},
            {"rank":8,"name":"jackwener/opencli","full_name":"opencli","author":"jackwener","desc":"让任何网站成为你的 CLI","stars":1366,"language":"TypeScript","url":"https://github.com/jackwener/opencli"},
            {"rank":9,"name":"skernelx/tavily-key-generator","full_name":"tavily-key-generator","author":"skernelx","desc":"Tavily 和 Firecrawl 注册自动化工具包","stars":1273,"language":"Python","url":"https://github.com/skernelx/tavily-key-generator"},
            {"rank":10,"name":"uditgoenka/autoresearch","full_name":"autoresearch","author":"uditgoenka","desc":"Claude Autoresearch 技能——自主目标驱动迭代","stars":1177,"language":"Shell","url":"https://github.com/uditgoenka/autoresearch"},
            {"rank":11,"name":"Infatoshi/OpenSquirrel","full_name":"OpenSquirrel","author":"Infatoshi","desc":"为被代理分心的人设计的 Claude Code 控制面板","stars":986,"language":"Rust","url":"https://github.com/Infatoshi/OpenSquirrel"},
            {"rank":12,"name":"Lum1104/Understand-Anything","full_name":"Understand-Anything","author":"Lum1104","desc":"将任意代码库转换为可探索的交互式知识图谱","stars":722,"language":"TypeScript","url":"https://github.com/Lum1104/Understand-Anything"},
            {"rank":13,"name":"karpathy/jobs","full_name":"jobs","author":"karpathy","desc":"可视化探索美国劳工统计局职业展望数据","stars":713,"language":"HTML","url":"https://github.com/karpathy/jobs"},
            {"rank":14,"name":"Michaelliv/pi-generative-ui","full_name":"pi-generative-ui","author":"Michaelliv","desc":"Claude.ai 的生成式 UI——逆向工程重建","stars":707,"language":"TypeScript","url":"https://github.com/Michaelliv/pi-generative-ui"},
            {"rank":15,"name":"CopilotKit/OpenGenerativeUI","full_name":"OpenGenerativeUI","author":"CopilotKit","desc":"开源生成式 UI 框架","stars":627,"language":"TypeScript","url":"https://github.com/CopilotKit/OpenGenerativeUI"}
        ];
        
        const languageColors = {
            'TypeScript': '#3178c6',
            'Python': '#3572A5',
            'JavaScript': '#f1e05a',
            'Rust': '#dea584',
            'Shell': '#89e051',
            'HTML': '#e34c26',
            'Unknown': '#6e7681'
        };
        
        function formatStars(num) {
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }
        
        function renderProjects(filteredProjects) {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';
            
            filteredProjects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.dataset.language = project.language;
                
                const isTop3 = project.rank <= 3;
                
                card.innerHTML = `
                    <div class="rank ${isTop3 ? 'top3' : ''}">${project.rank}</div>
                    <div class="project-header">
                        <a href="${project.url}" target="_blank" class="project-name">${project.full_name}</a>
                        <div class="project-author">by ${project.author}</div>
                    </div>
                    <div class="project-desc">${project.desc}</div>
                    <div class="project-meta">
                        <div class="meta-item stars">
                            <svg viewBox="0 0 16 16"><path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>
                            ${formatStars(project.stars)}
                        </div>
                        <div class="meta-item language">
                            <span class="language-dot" style="background-color: ${languageColors[project.language] || '#6e7681'}"></span>
                            ${project.language}
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        function filterByLanguage(language) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            if (language === 'all') {
                renderProjects(projects);
            } else {
                const filtered = projects.filter(p => p.language === language);
                renderProjects(filtered);
            }
        }
        
        // 初始渲染
        renderProjects(projects);
    </script>
</body>
</html>
